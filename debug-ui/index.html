<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Debug Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0a; color: #e0e0e0; padding: 16px; font-size: 11px; }
    h1 { color: #635bff; margin-bottom: 4px; font-size: 16px; }
    .status-bar { font-size: 11px; color: #666; margin-bottom: 10px; }
    .status-bar .connected { color: #4caf50; }
    .status-bar .disconnected { color: #f44336; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .full { grid-column: 1 / -1; }
    .span2 { grid-column: span 2; }
    .panel { background: #141414; border: 1px solid #222; border-radius: 5px; padding: 8px; }
    .panel h2 { font-size: 11px; color: #635bff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 3px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #555; padding: 2px 4px; border-bottom: 1px solid #1a1a1a; }
    td { padding: 2px 4px; border-bottom: 1px solid #111; vertical-align: top; }
    .tick { color: #635bff; font-weight: bold; }
    .gold { color: #ffd700; font-weight: bold; }
    .inv { color: #8bc34a; font-size: 10px; }
    .muted { color: #444; }
    .bounty-available { color: #4caf50; }
    .bounty-claimed { color: #ff9800; }
    .bounty-completed { color: #2196f3; }
    .bounty-submitted { color: #00bcd4; }
    #queue-info { font-size: 10px; color: #aaa; padding: 2px 0; }
    #queue-info strong { color: #635bff; }
    .chat-msg { padding: 2px 0; border-bottom: 1px solid #111; }
    .chat-msg strong { color: #635bff; }
    .log-entry { padding: 1px 0; }
    .log-tick { color: #333; font-size: 9px; margin-right: 4px; }
    .log-thought { font-style: italic; color: #888; }
    .log-action { font-weight: bold; }
    .log-speech { color: #e0e0e0; }
    .log-speech::before { content: '"'; color: #555; }
    .log-speech::after { content: '"'; color: #555; }
    .log-system { color: #555; }
    .log-decision { color: #635bff; font-weight: bold; }

    /* Agent cards */
    .agent-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 8px; }
    .agent-card { background: #141414; border: 1px solid #222; border-radius: 5px; padding: 10px; }
    .agent-card .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #222; }
    .agent-card .card-name { font-size: 14px; font-weight: bold; }
    .agent-card .card-gold { color: #ffd700; font-weight: bold; font-size: 13px; }
    .agent-card .card-meta { display: flex; gap: 8px; color: #666; font-size: 10px; margin-bottom: 6px; }
    .agent-card .card-meta .anim-idle { color: #555; }
    .agent-card .card-meta .anim-walking { color: #4caf50; }
    .agent-card .card-meta .anim-working { color: #ff9800; }
    .agent-card .needs-row { display: flex; gap: 3px; align-items: center; margin-bottom: 4px; }
    .nl { font-size: 9px; color: #555; width: 10px; }
    .nb { width: 50px; height: 6px; background: #1a1a1a; border-radius: 2px; overflow: hidden; display: inline-block; }
    .nf { height: 100%; display: block; border-radius: 2px; }
    .nv { font-size: 9px; color: #444; width: 20px; text-align: right; }
    .agent-card .card-section { margin-top: 6px; padding-top: 4px; border-top: 1px solid #1a1a1a; }
    .agent-card .card-section-title { font-size: 9px; color: #635bff; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .agent-card .card-inventory { color: #8bc34a; font-size: 10px; }
    .agent-card .card-inventory .item { display: inline-block; background: #1a2a1a; border: 1px solid #2a3a2a; border-radius: 3px; padding: 1px 5px; margin: 1px; }
    .agent-card .card-inventory button.item { font: inherit; line-height: inherit; }
    .agent-card .card-inventory .item-card { background: #1a1a2a; border-color: #2a2a3a; color: #8888cc; }
    .agent-card .card-inventory .item-doc { background: #2a2a1a; border-color: #3a3a2a; color: #cccc88; }
    .agent-card .card-inventory .item-egg { background: #2a1a1a; border-color: #3a2a2a; color: #ffcc44; }
    .agent-card .card-inventory .doc-link { cursor: pointer; }
    .agent-card .card-thoughts { max-height: 80px; overflow-y: auto; font-size: 10px; }
    .agent-card .card-thoughts .thought-entry { color: #888; font-style: italic; padding: 1px 0; border-bottom: 1px solid #111; }
    .agent-card .card-actions { max-height: 60px; overflow-y: auto; font-size: 10px; }
    .agent-card .card-actions .action-entry { padding: 1px 0; border-bottom: 1px solid #111; }
    .agent-card .card-actions .action-entry .act-tick { color: #333; font-size: 9px; margin-right: 3px; }
    .agent-card .card-actions .action-entry .act-text { color: #635bff; }
    .lib-entry { padding: 4px 0; border-bottom: 1px solid #111; cursor: pointer; }
    .lib-entry:hover { background: #1a1a1a; }
    .lib-entry .lib-title { color: #cccc88; font-weight: bold; }
    .lib-entry .lib-meta { color: #555; font-size: 10px; }
  </style>
</head>
<body>
  <h1>World Debug Monitor</h1>
  <div class="status-bar">
    <span id="conn-status" class="disconnected">disconnected</span>
    | Tick: <span id="tick-count" class="tick">-</span>
    | <span id="msg-rate">0 msg/s</span>
  </div>

  <div class="panel map-panel" style="margin-bottom: 8px;">
    <h2>World Map</h2>
    <div id="map-container" style="position: relative; width: 100%; height: 400px; overflow: auto; background: #111; border: 1px solid #222; border-radius: 4px; cursor: grab;">
      <div style="position: relative; width: 1000px; height: 400px; flex-shrink: 0;">
        <canvas id="world-map" width="1000" height="400" style="position: absolute; top: 0; left: 0;"></canvas>
        <div id="map-overlays" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
      </div>
    </div>
  </div>

  <!-- Agent cards -->
  <div class="agent-cards" id="agent-cards"></div>

  <div class="grid" style="margin-top:8px">
    <div class="panel">
      <h2>Conversations <label style="float:right;font-size:9px;color:#555;font-weight:normal;text-transform:none;letter-spacing:0"><input type="checkbox" id="chat-autoscroll" checked style="margin-right:3px">autoscroll</label></h2>
      <div id="chat-log" style="max-height:250px;overflow-y:auto"><span class="muted">No active conversations</span></div>
    </div>
    <div class="panel">
      <h2>Relationships</h2>
      <table>
        <thead><tr><th>Agent</th><th>Knows</th><th>Pts</th><th>Last Goal</th></tr></thead>
        <tbody id="rels-table"></tbody>
      </table>
    </div>
    <div class="panel">
      <h2>Bounty Board</h2>
      <div id="queue-info">-</div>
      <table>
        <thead><tr><th>Description</th><th>Reward</th><th>State</th><th>By</th></tr></thead>
        <tbody id="bounties-table"></tbody>
      </table>
    </div>
    <div class="panel full">
      <h2>Create Contract</h2>
      <form id="contract-form" style="display:flex;gap:6px;flex-wrap:wrap;align-items:end;">
        <label style="display:flex;flex-direction:column;gap:2px;"><span class="muted">Title</span><input name="title" value="Research task" style="background:#1a1a1a;border:1px solid #333;color:#e0e0e0;padding:3px 6px;border-radius:3px;width:140px;font-size:11px;"></label>
        <label style="display:flex;flex-direction:column;gap:2px;"><span class="muted">Description</span><input name="description" value="Search Google and write a report" style="background:#1a1a1a;border:1px solid #333;color:#e0e0e0;padding:3px 6px;border-radius:3px;width:220px;font-size:11px;"></label>
        <label style="display:flex;flex-direction:column;gap:2px;"><span class="muted">Reward</span><input name="reward" type="number" value="10" style="background:#1a1a1a;border:1px solid #333;color:#ffd700;padding:3px 6px;border-radius:3px;width:50px;font-size:11px;"></label>
        <label style="display:flex;flex-direction:column;gap:2px;"><span class="muted">TTL (ticks)</span><input name="ttl" type="number" value="500" style="background:#1a1a1a;border:1px solid #333;color:#e0e0e0;padding:3px 6px;border-radius:3px;width:60px;font-size:11px;"></label>
        <button type="submit" style="background:#635bff;color:white;border:none;padding:4px 12px;border-radius:3px;cursor:pointer;font-size:11px;height:24px;">Create</button>
        <span id="contract-status" class="muted" style="font-size:10px;"></span>
      </form>
    </div>
    <div class="panel full" style="max-height:300px;overflow-y:auto;" id="log-panel">
      <h2>Activity Log <label style="float:right;font-size:9px;color:#555;font-weight:normal;text-transform:none;letter-spacing:0"><input type="checkbox" id="log-autoscroll" checked style="margin-right:3px">autoscroll</label></h2>
      <div id="activity-log" style="font-size:11px;line-height:1.5;"></div>
    </div>
    <div class="panel">
      <h2>Library</h2>
      <div id="library-panel" style="max-height:250px;overflow-y:auto">
        <span class="muted">No documents archived yet</span>
      </div>
    </div>
    <div class="panel span2">
      <h2>Structures</h2>
      <table>
        <thead><tr><th>Type</th><th>Pos</th><th>Inventory</th></tr></thead>
        <tbody id="structures-table"></tbody>
      </table>
    </div>
  </div>
  <!-- Document modal -->
  <div id="doc-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center" onclick="this.style.display='none'">
    <div style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;max-width:700px;max-height:80vh;overflow-y:auto;width:90%" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h3 id="doc-title" style="color:#635bff;margin:0;font-size:13px"></h3>
        <span style="cursor:pointer;color:#666;font-size:16px" onclick="document.getElementById('doc-modal').style.display='none'">✕</span>
      </div>
      <pre id="doc-content" style="white-space:pre-wrap;font-size:11px;color:#ccc;line-height:1.6;margin:0"></pre>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
